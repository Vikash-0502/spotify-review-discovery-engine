services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: review-discovery-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: review_discovery
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d review_discovery"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
